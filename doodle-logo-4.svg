<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 544 184" role="img" aria-label="Google logo style 4">
  <title>Google logo style 4</title>
  <defs>
    <linearGradient id="gBlue" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#8fb1ff"/>
      <stop offset="0.48" stop-color="#3f68d8"/>
      <stop offset="1" stop-color="#24439f"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0" y1="0" x2="0.9" y2="1">
