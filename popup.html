<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Enhanced</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="popup-title-wrap">
        <div class="popup-badge">G</div>
        <div>
          <h1 class="popup-title">Google Enhanced</h1>
          <p class="popup-subtitle">Quick controls</p>
        </div>
      </div>
    </header>

    <section class="control-card" aria-label="Extension settings">
      <div class="control-copy">
        <span class="control-label">Google Enhanced</span>
        <span id="enhancedToggleStatus" class="control-status">On</span>
      </div>
      <button
        id="enhancedToggleSwitch"
        class="toggle-switch"
        type="button"
        role="switch"
        aria-checked="true"
        aria-label="Toggle Google Enhanced new tab"
      >
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </button>
    </section>

    <p class="popup-note">Turn it off to go back to Chrome's old new tab UI.</p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
