<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Tab</title>
  <script src="newtab-preload.js"></script>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="mac-topbar" aria-hidden="true">
    <div class="mac-topbar-row">
      <div class="mac-traffic">
        <span class="mac-dot mac-dot-red"></span>
        <span class="mac-dot mac-dot-yellow"></span>
        <span class="mac-dot mac-dot-green"></span>
      </div>
      <div class="mac-tab active">New Tab</div>
      <div class="mac-tab">VVELEVA</div>
      <div class="mac-plus">+</div>
    </div>
    <div class="mac-toolbar-row">
      <span class="mac-nav-btn">&#8592;</span>
      <span class="mac-nav-btn">&#8594;</span>
      <span class="mac-nav-btn">&#8635;</span>
      <div class="mac-url">vveleva.github.com</div>
      <span class="mac-star">&#9733;</span>
    </div>
  </div>

  <header class="top-nav" aria-label="Top navigation">
    <button id="doodleToggleBtn" class="doodle-btn" type="button" aria-label="Toggle Google doodle">Doodle: On</button>
    <button id="doodleVariantBtn" class="doodle-btn" type="button" aria-label="Toggle doodle logo">Logo: 1</button>
    <button id="defaultUiModeBtn" class="doodle-btn" type="button" aria-label="Toggle default background mode">Default: Light</button>
    <a class="top-link" href="https://mail.google.com/" title="Gmail">Gmail</a>
    <a class="top-link" href="https://www.google.com/imghp" title="Images">Images</a>
    <button id="appsBtn" class="apps-btn" type="button" title="Google Apps" aria-label="Google Apps" aria-expanded="false">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </button>
    <a id="accountSignInBtn" class="account-signin-btn hidden" href="https://accounts.google.com/ServiceLogin?continue=https://www.google.com/" title="Sign in" aria-label="Sign in">Sign in</a>
    <a id="accountChip" class="account-chip" href="https://myaccount.google.com/" title="Google Account" aria-label="Google Account">
      <img id="accountAvatar" class="account-avatar hidden" alt="Account avatar" loading="lazy">
      <span id="accountInitial" class="account-initial">A</span>
    </a>
    <section id="accountMenu" class="account-menu hidden" aria-label="Account actions">
      <button id="accountSignOutBtn" class="account-menu-btn" type="button">Sign out</button>
      <button id="accountChangePhotoBtn" class="account-menu-btn" type="button">Change photo</button>
      <button id="accountAddAccountBtn" class="account-menu-btn" type="button">Add account</button>
    </section>
    <input id="accountPhotoFile" class="hidden" type="file" accept="image/*">

    <section id="appsPanel" class="apps-panel hidden" aria-label="Google apps">
      <div class="apps-panel-shell">
        <div class="apps-theme-row">
          <span class="apps-theme-label">Frame</span>
          <button id="appsThemeToggleBtn" class="apps-theme-toggle" type="button" aria-label="Toggle apps frame theme">Frame: Dark</button>
        </div>
        <div id="appsIframeWrap" class="apps-iframe-wrap hidden" aria-hidden="true">
          <iframe id="appsIframe" class="apps-iframe" role="presentation" frameborder="0" scrolling="no" name="app"></iframe>
        </div>
        <div id="appsScroll" class="apps-scroll">
          <div id="appsGrid" class="apps-grid"></div>
        </div>
        <div class="apps-panel-footer">
          <a class="apps-more-btn" href="https://about.google/products/" title="More from Google">More from Google</a>
        </div>
      </div>
    </section>
  </header>

  <main class="wrap">
    <div class="doodle-slot" aria-hidden="true">
      <img
        id="doodleArt"
        class="doodle-art"
        src="doodle-logo-1.png"
        alt="Google doodle"
        width="272"
        height="92"
        style="visibility:hidden;opacity:0"
      >
    </div>

    <form id="searchForm" class="search" action="https://www.google.com/search" method="get" autocomplete="off">
      <span class="search-icon" aria-hidden="true">&#128269;</span>
      <input
        id="q"
        name="q"
        type="text"
        placeholder="Search Google or type a URL"
        aria-label="Search"
      >
      <button id="imageSearchBtn" class="image-search-btn" type="button" aria-label="Search by image" title="Search by image">
        <span aria-hidden="true">&#128247;</span>
      </button>
      <button id="aiModeBtn" class="ai-btn" type="button" aria-label="AI Mode">AI Mode</button>
    </form>
    <form id="imageSearchUploadForm" class="hidden" method="post" action="https://www.google.com/searchbyimage/upload" enctype="multipart/form-data">
      <input id="imageSearchFile" type="file" name="encoded_image" accept="image/*">
      <input type="hidden" name="hl" value="en">
    </form>
    <section id="imageSearchDialogOverlay" class="image-search-dialog-overlay hidden" aria-hidden="true">
      <div id="imageSearchDialog" class="image-search-dialog" role="dialog" aria-modal="true" aria-label="Search any image with Lens">
        <button id="imageSearchDialogClose" class="image-search-dialog-close" type="button" aria-label="Close image search">&#10005;</button>
        <h2 class="image-search-dialog-title">Search any image with Lens</h2>
        <div id="imageSearchDropZone" class="image-search-drop-zone" role="button" tabindex="0" aria-label="Drag an image here or upload a file">
          <div class="image-search-drop-content">
            <span class="image-search-drop-icon" aria-hidden="true">&#128247;</span>
            <span>Drag an image here or</span>
            <button id="imageSearchUploadBtn" class="image-search-upload-btn" type="button">upload a file</button>
          </div>
        </div>
        <div class="image-search-or-row">
          <span>OR</span>
        </div>
        <div class="image-search-url-row">
          <input id="imageSearchUrlInput" type="url" placeholder="Paste image link" aria-label="Paste image link">
          <button id="imageSearchUrlSubmit" type="button">Search</button>
        </div>
        <div id="imageSearchLoading" class="image-search-loading hidden" aria-live="polite">
          <div class="image-search-loading-spinner" aria-hidden="true"></div>
          <div class="image-search-loading-text">Searching image...</div>
        </div>
      </div>
    </section>

    <section class="shortcuts" aria-label="Shortcuts">
      <div id="shortcutsGrid" class="shortcuts-grid"></div>
    </section>
  </main>

  <div class="quick-actions">
    <button id="bgBtn" class="bg-btn" type="button" aria-label="Change background">Change background</button>
  </div>

  <div id="bgPanel" class="bg-panel hidden" role="dialog" aria-modal="false" aria-label="Background settings">
    <button id="themesMenuBtn" type="button" aria-label="Apply previous background">Apply previous background</button>
    <div id="themesCatalog" class="themes-catalog hidden" aria-label="Theme categories">
      <button id="defaultThemeCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-default"></span>
        <span class="catalog-name">Default Chrome</span>
      </button>
      <button id="uploadThemeCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-upload"></span>
        <span class="catalog-name">Upload an image</span>
      </button>
      <button id="solidColoursCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-solid"></span>
        <span class="catalog-name">Solid colours</span>
      </button>
      <button id="macOsXCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-macosx" data-static-thumbnail="true"></span>
        <span class="catalog-name">Mac OS X</span>
      </button>
      <button id="risingArtistsCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Rising artists</span>
      </button>
      <button id="arturoTorresCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Arturo Torres collection</span>
      </button>
      <button id="nativeAmericanArtistsCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-1"></span>
        <span class="catalog-name">Native American artists</span>
      </button>
      <button id="asianPacificArtistsCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-1"></span>
        <span class="catalog-name">Asian and Pacific Islander artists</span>
      </button>
      <button id="latinoArtistsCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-2"></span>
        <span class="catalog-name">Latino artists</span>
      </button>
      <button id="blackArtistsCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-1"></span>
        <span class="catalog-name">Black artists</span>
      </button>
      <button id="landscapesCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Landscapes</span>
      </button>
      <button id="texturesCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-2"></span>
        <span class="catalog-name">Textures</span>
      </button>
      <button id="geometricShapesCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-2"></span>
        <span class="catalog-name">Geometric shapes</span>
      </button>
      <button id="earthCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Earth</span>
      </button>
      <button id="artCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Art</span>
      </button>
      <button id="cityscapeCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Cityscape</span>
      </button>
      <button id="seascapesCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-rising"></span>
        <span class="catalog-name">Seascapes</span>
      </button>
      <button id="lifeCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-1"></span>
        <span class="catalog-name">Life</span>
      </button>
      <button id="vibeCanvasCard" type="button" class="catalog-card">
        <span class="catalog-thumb catalog-thumb-generic-2"></span>
        <span class="catalog-name">Vibe Canvas</span>
      </button>
    </div>
    <div id="themesListWrap" class="themes-list-wrap hidden" aria-label="Rising artists wallpapers">
      <div class="themes-list-head">
        <button id="themesBackBtn" type="button" class="themes-back-btn" aria-label="Back">Back</button>
        <span id="themesSectionTitle">Rising artists</span>
      </div>
      <div id="themesList" class="themes-list"></div>
    </div>
    <input id="bgFile" class="hidden" type="file" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
  </div>

  <template id="shortcutTemplate">
    <a class="shortcut" href="#">
      <img class="shortcut-icon" alt="" loading="lazy">
      <span class="shortcut-title"></span>
      <button class="shortcut-delete" type="button" aria-label="Remove shortcut">x</button>
    </a>
  </template>

  <script src="newtab.js"></script>
</body>
</html>
